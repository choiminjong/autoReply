<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — Mail Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
      --error: #f85149;
      --input-bg: #0d1117;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-container {
      width: 100%;
      max-width: 380px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }

    .auth-logo-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .auth-logo-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }

    .auth-card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-color: #58a6ff;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.4);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
      display: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-ms {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-ms:hover {
      background: rgba(255,255,255,0.04);
      border-color: #58a6ff;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <span class="auth-logo-icon">📬</span>
      <div class="auth-logo-title">Mail Kanban</div>
      <div class="auth-logo-subtitle">팀 메일 칸반보드 관리 시스템</div>
    </div>

    <div class="auth-card">
      <h2>로그인</h2>

      <div class="error-msg" id="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="btn-submit">로그인</button>
      </form>
    </div>

    <div class="auth-footer">
      계정이 없으신가요? <a href="/register">회원가입</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btn = document.getElementById('btn-submit');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '로그인 중...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          credentials: 'include',
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || '로그인 실패');
          return;
        }

        // CSRF 토큰을 localStorage에 저장 (이후 요청에 사용)
        if (data.csrf_token) {
          localStorage.setItem('csrf_token', data.csrf_token);
        }

        window.location.href = '/';
      } catch (err) {
        showError('서버 연결 오류가 발생했습니다.');
      } finally {
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });

    // Enter 키 지원
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
